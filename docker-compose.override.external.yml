# Override file for external proxy mode
# Usage: docker compose -f docker-compose.dev.yml -f docker-compose.override.external.yml up -d
#
# This puts ALL services (postgres, redis, proxy, editor) into a single compose
# stack on the same network so they can communicate by service name.
services:
  postgres:
    image: postgres:17-alpine
    container_name: m3u-postgres-dev
    environment:
      - POSTGRES_DB=m3ue_dev
      - POSTGRES_USER=m3ue
      - POSTGRES_PASSWORD=devpass
    volumes:
      - pgdata_external_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m3ue -d m3ue_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine3.22
    container_name: m3u-redis-dev
    command: redis-server --requirepass devpass
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  m3u-proxy:
    image: sparkison/m3u-proxy:latest
    container_name: m3u-proxy-dev
    shm_size: '512m'
    environment:
      - API_TOKEN=devpass
      - PORT=38085
      - REDIS_ENABLED=true
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=devpass
      - REDIS_DB=6
      - ENABLE_REDIS_POOLING=true

      # HLS segment storage (proxy writes these, not the editor)
      - HLS_TEMP_DIR=/tmp/m3u-proxy-streams
      - HLS_GC_ENABLED=true
      - HLS_GC_INTERVAL=600
      - HLS_GC_AGE_THRESHOLD=7200

      # Broadcast segments on RAM disk for low-latency live TV
      - HLS_BROADCAST_DIR=/dev/shm
      - BROADCAST_GC_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:38085/health?api_token=devpass"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  m3u-editor-dev:
    ports:
      !override
      - "36450:36450"
    shm_size: '512m'
    environment:
      # Disable embedded services
      - ENABLE_POSTGRES=false
      - REDIS_ENABLED=false
      - M3U_PROXY_ENABLED=false

      # External PostgreSQL (service name on shared network)
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=m3ue_dev
      - DB_USERNAME=m3ue
      - DB_PASSWORD=devpass

      # External Redis (service name on shared network)
      - REDIS_HOST=redis
      - REDIS_SERVER_PORT=6379
      - REDIS_PASSWORD=devpass

      # Session & cache via redis
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis

      # External M3U Proxy (service name on shared network)
      - M3U_PROXY_HOST=m3u-proxy
      - M3U_PROXY_PORT=38085
      - M3U_PROXY_TOKEN=devpass

      # Network broadcasting (pseudo-TV channels)
      - NETWORK_BROADCAST_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      m3u-proxy:
        condition: service_healthy

volumes:
  pgdata_external_dev:
    driver: local
